# Render Blueprint Spec
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: campusconnect
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
