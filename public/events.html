<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all upcoming events on CampusConnect. Filter by category.">
  <title>Events — CampusConnect</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-mesh"></div>
  <div class="bg-gradient-blur"></div>
  <div class="floating-shapes">
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>
  </div>

  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="nav-brand-icon">🎓</span>
      CampusConnect
    </a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/clubs">Clubs</a></li>
      <li><a href="/events" class="active">Events</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
      <div class="nav-auth"></div>
    </div>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="dashboard" style="padding-top: 100px;">
    <div class="container">
      <div class="dashboard-header fade-in">
        <div>
          <h1 class="section-title">Event Timeline</h1>
          <p class="section-subtitle" style="margin-bottom:0;">All upcoming workshops, competitions, and fests in one place</p>
        </div>
      </div>

      <div class="filter-bar fade-in">
        <div class="category-filters" id="category-filters">
          <button class="filter-chip active" onclick="setCategory('All', this)">All</button>
          <button class="filter-chip" onclick="setCategory('Coding', this)">💻 Coding</button>
          <button class="filter-chip" onclick="setCategory('Music', this)">🎵 Music</button>
          <button class="filter-chip" onclick="setCategory('Sports', this)">⚽ Sports</button>
          <button class="filter-chip" onclick="setCategory('Arts', this)">🎨 Arts</button>
          <button class="filter-chip" onclick="setCategory('Science', this)">🔬 Science</button>
          <button class="filter-chip" onclick="setCategory('Literature', this)">📚 Literature</button>
          <button class="filter-chip" onclick="setCategory('Photography', this)">📷 Photography</button>
          <button class="filter-chip" onclick="setCategory('Dance', this)">💃 Dance</button>
          <button class="filter-chip" onclick="setCategory('Social Service', this)">🤝 Social</button>
        </div>
      </div>

      <div class="grid grid-3" id="events-grid">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">&copy; 2026 CampusConnect. Built for students, by students.</div>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    let activeCategory = 'All';

    document.addEventListener('DOMContentLoaded', () => loadEvents());

    async function loadEvents() {
      try {
        let params = 'upcoming=true';
        if (activeCategory !== 'All') params += `&category=${activeCategory}`;
        const events = await api.getEvents(params);
        renderEvents(events);
      } catch (err) {
        document.getElementById('events-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">😕</div><h3>Failed to load events</h3></div>';
      }
    }

    function renderEvents(events) {
      const grid = document.getElementById('events-grid');
      const user = api.getUser();

      if (events.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📅</div><h3>No events found</h3><p>Try adjusting your filter or check back later.</p></div>';
        return;
      }

      grid.innerHTML = events.map((event, i) => {
        const dp = getDateParts(event.date);
        const isInterested = user && event.interestedUsers && event.interestedUsers.some(u => (typeof u === 'string' ? u : u._id) === user._id);
        return `
          <div class="card event-card fade-in stagger-${(i % 4) + 1}">
            <div class="event-poster" style="${event.poster ? `background-image:url(${event.poster});background-size:cover;background-position:center;` : ''}display:flex;align-items:center;justify-content:center;font-size:3rem;">
              ${event.poster ? '' : getCategoryEmoji(event.category)}
            </div>
            <div class="event-date-badge">
              <span class="day">${dp.day}</span>
              <span class="month">${dp.month}</span>
            </div>
            <div class="event-info">
              <span class="card-badge">${getCategoryEmoji(event.category)} ${event.category}</span>
              <h3>${event.title}</h3>
              <p>${truncate(event.description, 80)}</p>
            </div>
            <div class="card-meta">
              <span>📍 ${event.venue}</span>
              <span>🕐 ${event.time}</span>
              ${event.club ? `<span>🏫 ${event.club.name}</span>` : ''}
            </div>
            <div class="event-footer" style="margin-top:0.8rem;">
              ${user ? `
                <button class="interest-btn ${isInterested ? 'active' : ''}" onclick="toggleInterest('${event._id}', this)">
                  ❤️ <span>${event.interestedUsers ? event.interestedUsers.length : 0}</span> Interested
                </button>
              ` : `<span class="interest-count">❤️ ${event.interestedUsers ? event.interestedUsers.length : 0} Interested</span>`}
            </div>
          </div>
        `;
      }).join('');
    }

    function setCategory(category, el) {
      activeCategory = category;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      loadEvents();
    }

    async function toggleInterest(eventId, btn) {
      if (!api.isLoggedIn()) {
        showToast('Please log in to mark interest', 'warning');
        return;
      }
      try {
        const data = await api.toggleInterest(eventId);
        btn.classList.toggle('active', data.interested);
        btn.querySelector('span').textContent = data.count;
        showToast(data.interested ? 'Added to your interests!' : 'Removed from interests', 'success');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
  </script>
</body>
</html>
